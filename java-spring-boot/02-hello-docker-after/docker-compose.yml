networks:
    aw-network:
        driver: bridge

volumes:
    prometheus_data:
    grafana_data:

services:
    prometheus:
        image: prom/prometheus:latest
        user: root
        volumes:
          - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
          - prometheus_data:/prometheus
        networks:
          - aw-network
        ports:
          - 9090:9090
        extra_hosts:
          - "host.docker.internal:host-gateway"
    grafana:
        image: grafana/grafana:latest
        user: root
        ports:
          - 3001:3000
        networks:
          - aw-network
        volumes:
          - grafana_data:/var/lib/grafana